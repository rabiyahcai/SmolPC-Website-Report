<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820" role="img" aria-labelledby="title desc">
  <title id="title">Host-assisted provider sequence</title>
  <desc id="desc">A sequence diagram showing a host-assisted request flowing from the user interface through the Tauri backend, provider registry, connector bridge, shared engine, and external host application.</desc>
  <style>
    .bg { fill: #f7f5ef; }
    .lane { stroke: #7c8b99; stroke-width: 2; stroke-dasharray: 8 8; }
    .head { fill: #e8f5dd; stroke: #16324f; stroke-width: 2.5; rx: 16; ry: 16; }
    .engine { fill: #d8ecff; }
    .host { fill: #fff0d7; }
    .text { font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0d2033; }
    .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #203549; }
    .arrow { stroke: #16324f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#16324f"/>
    </marker>
  </defs>

  <rect class="bg" width="1320" height="820"/>

  <rect class="head" x="40" y="36" width="150" height="60"/>
  <rect class="head" x="230" y="36" width="170" height="60"/>
  <rect class="head" x="450" y="36" width="170" height="60"/>
  <rect class="head host" x="670" y="36" width="170" height="60"/>
  <rect class="head engine" x="890" y="36" width="170" height="60"/>
  <rect class="head host" x="1110" y="36" width="170" height="60"/>

  <text class="text" x="115" y="74" text-anchor="middle">User</text>
  <text class="text" x="315" y="74" text-anchor="middle">Svelte UI</text>
  <text class="text" x="535" y="74" text-anchor="middle">Tauri Backend</text>
  <text class="text" x="755" y="74" text-anchor="middle">Provider</text>
  <text class="text" x="975" y="74" text-anchor="middle">Engine</text>
  <text class="text" x="1195" y="74" text-anchor="middle">Host App</text>

  <line class="lane" x1="115" y1="108" x2="115" y2="760"/>
  <line class="lane" x1="315" y1="108" x2="315" y2="760"/>
  <line class="lane" x1="535" y1="108" x2="535" y2="760"/>
  <line class="lane" x1="755" y1="108" x2="755" y2="760"/>
  <line class="lane" x1="975" y1="108" x2="975" y2="760"/>
  <line class="lane" x1="1195" y1="108" x2="1195" y2="760"/>

  <path class="arrow" d="M115 170 H315"/>
  <text class="small" x="215" y="156" text-anchor="middle">1. Submit host-assisted request</text>

  <path class="arrow" d="M315 250 H535"/>
  <text class="small" x="425" y="236" text-anchor="middle">2. invoke unified assistant command</text>

  <path class="arrow" d="M535 330 H755"/>
  <text class="small" x="645" y="316" text-anchor="middle">3. resolve active mode provider</text>

  <path class="arrow" d="M755 410 H1195"/>
  <text class="small" x="975" y="396" text-anchor="middle">4. inspect bridge state or execute structured tool</text>

  <path class="arrow" d="M755 510 H975"/>
  <text class="small" x="865" y="496" text-anchor="middle">5. plan, classify, or summarise with engine</text>

  <path class="arrow" d="M1195 600 H755"/>
  <text class="small" x="975" y="586" text-anchor="middle">6. return tool result or host status</text>

  <path class="arrow" d="M755 680 H315"/>
  <text class="small" x="535" y="666" text-anchor="middle">7. send user-facing summary and mode state</text>

  <path class="arrow" d="M315 740 H115"/>
  <text class="small" x="215" y="726" text-anchor="middle">8. render result in same conversation view</text>
</svg>
